# Fly.io configuration for the text-them API.
# Create the app once with: fly launch --no-deploy --copy-config
# Set secrets with: fly secrets set MONGODB_URI=... TWILIO_AUTH_TOKEN=... etc.
app = "textthem-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Build context is the repo root so the monorepo workspaces are available.
  # Run `fly deploy` from the repo root with: fly deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile .

[env]
  NODE_ENV = "production"
  PORT = "8080"
  MONGODB_DB_NAME = "textthem"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
