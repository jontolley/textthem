name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Build shared first: apps depend on its compiled output.
      - run: npm run build --workspace @text-them/shared
      - run: npm run typecheck
      - run: npm test
      - run: npm run build --workspace @text-them/web
